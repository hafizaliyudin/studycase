version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgresql
    environment:
      POSTGRES_PASSWORD: 12345
    
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - 5432:5432

  adminer:
    image: adminer
    container_name: admin
    ports:
      - 8012:8080

volumes:
    pgdata:
      external: true
